// EcoFlow IoT BLE common protocol (corebiz/bluetooth/proto/IotComm).
// Reverse-engineered from the EcoFlow Android app; carries the certificate/
// token BLE auth used by Power Kit / 'Space' devices (Power Hub, etc.).
syntax = "proto3";

package iot_comm;

enum IotCmdSets {
  IOT_NONE_CMD_SETS = 0;
  IOT_COMM_CMD_SETS = 53;
}

enum IotCmdId {
  IOT_CMD_ID_NONE = 0;
  IOT_CMD_ID_MODULE_INFO = 113;
  IOT_CMD_ID_PACK_LOG = 114;
  IOT_CMD_ID_CONFIG_POWER_STATE = 118;
  IOT_CMD_ID_AUTH_TYPE = 137;
  IOT_CMD_ID_START_BIND = 168;
  IOT_CMD_ID_CONFIRM_BIND = 169;
  IOT_CMD_ID_REFRESH_TOKEN = 170;
  IOT_CMD_ID_AUTHENTICATION = 171;
  IOT_CMD_ID_UNBIND = 132;
  IOT_CMD_ID_POINT_MESSAGE = 251;
}

enum UserRoleType {
  UserRoleInstaller = 0;
  UserRoleNormal = 1;
  UserRoleShared = 2;
  UserRoleUnknown = 255;
}

enum IotErrCode {
  Success = 0;
  ReqParamErr = 3;
  DeviceErr = 4;
  DeviceBounded = 5;
  PBDecodeErr = 6;
  DecodeErr = 7;
  RandomCodeErr = 8;
  UserInfoErr = 9;
  SaveUserErr = 10;
  SaveTokenErr = 11;
  UserNotExist = 12;
  SNNotReady = 13;
  SecretKeyNotReady = 14;
  UserErr = 15;
  TokenErr = 16;
  PayloadVerErr = 17;
  SNErr = 18;
  DevWriteErr = 19;
  TokenExpire = 20;
  Others = 255;
}

enum Iot4GErrCode {
  MODEM_ERR_NONE = 0;
  MODEM_ERR_SIM_NOT_INSERTED = 1;
  MODEM_ERR_PIN_REQUIRED = 2;
  MODEM_ERR_PUK_REQUIRED = 3;
  MODEM_ERR_SIM_ERROR = 4;
  MODEM_ERR_NOT_OPERATOR = 6;
  MODEM_ERR_USB_DISCONNECT = 7;
  MODEM_ERR_UNKNOWN_DEVICE = 8;
  MODEM_ERR_CTL_ERROR = 9;
}

enum Iot4GRat {
  RAT_NONE = 0;
  RAT_2G = 2;
  RAT_3G = 3;
  RAT_4G = 4;
}

enum Iot4GReg {
  REG_STAT_SEARCHING = 0;
  REG_STAT_REGISTERED = 1;
  REG_STAT_NOTREGISTERED = 2;
  REG_STAT_DENIED = 3;
  REG_STAT_UNKNOWN = 4;
  REG_STAT_ROAMING = 5;
}

enum Iot4GAuth {
  APN_AUTH_NONE = 0;
  APN_AUTH_PAP = 1;
  APN_AUTH_CHAP = 2;
  APN_AUTH_PAP_CHAP = 3;
}

enum Iot4GIPType {
  IP_UNKNOWN = 0;
  IPV4 = 1;
  IPV6 = 2;
  IPV4V6 = 3;
}

enum E_LEVEL {
  E_LEVEL_SUCCESS = 0;
  E_LEVEL_ERR = 1;
  E_LEVEL_WARN = 2;
  E_LEVEL_INFO = 3;
}

message ModuleInfo {
  uint32 product_type = 1;
  uint32 product_detail = 2;
  string module_sn = 3;
  string cpuid = 4;
  uint32 running_sta = 5;
  uint32 addr = 6;
  uint32 d_addr = 7;
  uint32 app_ver = 8;
  uint32 loader_ver = 9;
}

message ModuleClusterInfo {
  repeated ModuleInfo modules = 1;
  uint32 total_page = 2;
  uint32 page = 3;
}

message AuthTypeAck {
  uint32 status = 1;
  uint32 version = 2;
  uint32 auth_type = 3;
}

message StartBindAck {
  uint32 result = 1;
  string random_code = 2;
  string signature_digest = 3;
}

message ConfirmBind {
  string random_code = 1;
  string user_info_en = 2;
}

message ConfirmBindAck {
  uint32 result = 1;
  string user_token = 2;
}

message RefreshToken {
  string random_code = 1;
  string user_info_en = 2;
}

message RefreshTokenAck {
  uint32 result = 1;
  string user_token = 2;
}

message Authentication {
  uint32 user_role = 1;
  string user_token = 2;
}

message AuthenticationAck {
  uint32 result = 1;
}

message PackLogCmd {
  repeated uint32 idx = 1;
}

message PackLogCmdAck {
  uint32 result = 1;
}

message Iot4GInfoGetAck {
  sint32 enable = 1;
  sint32 usb_con = 2;
  sint32 pdp_active = 3;
  string sim_iccid = 4;
  string sim_imsi = 5;
  string modem_imei = 6;
  string modem_ver = 7;
  string network_act = 8;
  string network_sopr = 9;
  string network_nopr = 10;
  string network_band = 11;
  Iot4GRat network_rat = 12;
  Iot4GReg network_reg = 13;
  sint32 signal_rssi = 14;
  Iot4GErrCode err_code = 15;
  sint32 singal_ico = 16;
  uint32 ip = 17;
}

message Iot4GApnGetAck {
  string apn = 1;
  string user = 2;
  string password = 3;
  Iot4GAuth auth = 4;
  Iot4GIPType ip_type = 5;
}

message Iot4GApnSet {
  string apn = 1;
  string user = 2;
  string password = 3;
  Iot4GAuth auth = 4;
  Iot4GIPType ip_type = 5;
}

message Iot4GApnSetAck {
  sint32 result = 1;
}

message Iot4GEnableSet {
  sint32 enable = 1;
}

message Iot4GEnableSetAck {
  sint32 result = 1;
}

message IotAPInfoGetAck {
  string ssid_len = 1;
  string ssid = 2;
  string passwd_len = 3;
  string password = 4;
  string channel = 5;
  string ecn = 6;
  string max_conn = 7;
  string ssid_hidden = 8;
  string has_modify = 9;
}

message IotAPInfoSet {
  string ssid_len = 1;
  string ssid = 2;
  string passwd_len = 3;
  string password = 4;
  string channel = 5;
  string ecn = 6;
  string max_conn = 7;
  string ssid_hidden = 8;
}

message IotAPInfoSetAck {
  uint32 state = 1;
}

message IotPointMessage {
  uint64 point_time = 1;
  uint64 upload_time = 2;
  E_LEVEL level = 3;
  uint32 code = 4;
  string message = 5;
  bool point_time_confidence = 6;
  bool upload_time_confidence = 7;
}

message ConfigPowerState {
  int32 power_state = 1;
}

message ConfigPowerStateAck {
  int32 state = 1;
}
